<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-label="bunqueue dashboard">
  <title>bunqueue dashboard</title>
  <defs>
    <linearGradient id="bqd-badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
  </defs>
  <!-- Badge -->
  <rect x="4" y="4" width="92" height="92" rx="24" fill="url(#bqd-badge)"/>
  <!-- Queue draining left→right: three job pills of decreasing width -->
  <rect x="24" y="30" width="52" height="11" rx="5.5" fill="#ffffff" opacity="0.96"/>
  <rect x="24" y="47" width="40" height="11" rx="5.5" fill="#ffffff" opacity="0.78"/>
  <rect x="24" y="64" width="26" height="11" rx="5.5" fill="#ffffff" opacity="0.58"/>
  <!-- Active-processing pulse dot -->
  <circle cx="70" cy="69.5" r="7" fill="#ffffff"/>
  <circle cx="70" cy="69.5" r="7" fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="3">
    <animate attributeName="r" values="7;11;7" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.45;0;0.45" dur="1.8s" repeatCount="indefinite"/>
  </circle>
</svg>
