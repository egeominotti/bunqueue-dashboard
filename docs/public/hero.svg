<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" fill="none" role="img" aria-labelledby="hero-t">
  <title id="hero-t">bunqueue dashboard — a live queue control panel</title>
  <defs>
    <linearGradient id="hg-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hg-pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="hg-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="hg-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#db2777" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- ambient glow -->
  <ellipse cx="300" cy="200" rx="250" ry="180" fill="url(#hg-glow)"/>

  <!-- app panel -->
  <g filter="url(#hg-shadow)">
    <rect x="40" y="34" width="480" height="352" rx="22" fill="#0f1117" stroke="#242a36" stroke-width="1.5"/>
  </g>

  <!-- sidebar (rounded left corners to match the panel, squared on the right) -->
  <rect x="40" y="34" width="56" height="352" rx="22" fill="#0b0d12"/>
  <rect x="74" y="34" width="22" height="352" fill="#0b0d12"/>
  <rect x="56" y="52" width="24" height="24" rx="7" fill="url(#hg-pink)"/>
  <rect x="58" y="94" width="20" height="6" rx="3" fill="#ec4899" opacity="0.85"/>
  <rect x="58" y="116" width="20" height="6" rx="3" fill="#39404e"/>
  <rect x="58" y="138" width="20" height="6" rx="3" fill="#39404e"/>
  <rect x="58" y="160" width="20" height="6" rx="3" fill="#39404e"/>
  <rect x="58" y="182" width="20" height="6" rx="3" fill="#39404e"/>

  <!-- header -->
  <rect x="116" y="54" width="150" height="12" rx="6" fill="#2b313d"/>
  <rect x="116" y="76" width="92" height="8" rx="4" fill="#1c212b"/>
  <rect x="418" y="52" width="82" height="22" rx="11" fill="#ec4899" opacity="0.14"/>
  <circle cx="432" cy="63" r="4" fill="#34d399"/>
  <rect x="442" y="60" width="46" height="6" rx="3" fill="#8a93a3"/>

  <!-- stat cards -->
  <g>
    <rect x="116" y="104" width="118" height="70" rx="12" fill="#151a23" stroke="#232936"/>
    <rect x="132" y="120" width="42" height="6" rx="3" fill="#3a4150"/>
    <rect x="132" y="138" width="66" height="16" rx="5" fill="url(#hg-pink)"/>
    <rect x="132" y="162" width="30" height="5" rx="2.5" fill="#2b313d"/>

    <rect x="246" y="104" width="118" height="70" rx="12" fill="#151a23" stroke="#232936"/>
    <rect x="262" y="120" width="42" height="6" rx="3" fill="#3a4150"/>
    <rect x="262" y="138" width="54" height="16" rx="5" fill="#34d399"/>
    <rect x="262" y="162" width="30" height="5" rx="2.5" fill="#2b313d"/>

    <rect x="376" y="104" width="124" height="70" rx="12" fill="#151a23" stroke="#232936"/>
    <rect x="392" y="120" width="42" height="6" rx="3" fill="#3a4150"/>
    <rect x="392" y="138" width="48" height="16" rx="5" fill="#fbbf24"/>
    <rect x="392" y="162" width="30" height="5" rx="2.5" fill="#2b313d"/>
  </g>

  <!-- chart card -->
  <rect x="116" y="188" width="248" height="164" rx="12" fill="#151a23" stroke="#232936"/>
  <rect x="132" y="204" width="60" height="7" rx="3.5" fill="#3a4150"/>
  <line x1="132" y1="316" x2="348" y2="316" stroke="#232936" stroke-width="1"/>
  <line x1="132" y1="288" x2="348" y2="288" stroke="#1c212b" stroke-width="1"/>
  <line x1="132" y1="260" x2="348" y2="260" stroke="#1c212b" stroke-width="1"/>
  <path d="M132 300 L160 286 L188 296 L216 262 L244 274 L272 240 L300 252 L328 224 L348 232 L348 316 L132 316 Z" fill="url(#hg-area)"/>
  <path d="M132 300 L160 286 L188 296 L216 262 L244 274 L272 240 L300 252 L328 224 L348 232" fill="none" stroke="url(#hg-pink)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="328" cy="224" r="3.5" fill="#f472b6"/>

  <!-- queue-depth card (brand queue motif) -->
  <rect x="376" y="188" width="124" height="164" rx="12" fill="#151a23" stroke="#232936"/>
  <rect x="392" y="204" width="54" height="7" rx="3.5" fill="#3a4150"/>
  <rect x="392" y="226" width="92" height="12" rx="6" fill="#ffffff" opacity="0.92"/>
  <rect x="392" y="248" width="72" height="12" rx="6" fill="#ec4899" opacity="0.7"/>
  <rect x="392" y="270" width="52" height="12" rx="6" fill="#ec4899" opacity="0.45"/>
  <rect x="392" y="292" width="34" height="12" rx="6" fill="#39404e"/>
  <circle cx="470" cy="322" r="8" fill="#ec4899" opacity="0.18"/>
  <circle cx="470" cy="322" r="4" fill="#ec4899"/>
</svg>
