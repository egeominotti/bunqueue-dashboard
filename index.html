<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <script>
      // Pre-paint theme: apply the persisted choice before the bundle loads so
      // light-theme users don't get a dark first-paint flash on every visit.
      // Key + shape must match themeStore (zustand persist: {state:{theme}}).
      try {
        const t = JSON.parse(localStorage.getItem('bq-dash-theme')).state.theme;
        if (t === 'light' || t === 'dark') {
          document.documentElement.dataset.theme = t;
          document.documentElement.style.colorScheme = t;
        }
      } catch {}
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>bunqueue · dashboard (beta)</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
