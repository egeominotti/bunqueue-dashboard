<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <script>
      // Pre-paint theme: apply the persisted choice before the bundle loads so
      // light-theme users don't get a dark first-paint flash on every visit.
      // Key + shape must match themeStore (zustand persist: {state:{theme}}).
      try {
        const t = JSON.parse(localStorage.getItem('bq-dash-theme')).state.theme;
        if (t === 'light' || t === 'dark') {
          document.documentElement.dataset.theme = t;
          document.documentElement.style.colorScheme = t;
        }
      } catch {}
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>bunqueue dashboard — drive a Bun job queue from your browser</title>
    <meta
      name="description"
      content="A free, open-source web dashboard that fully drives a bunqueue server: queues, jobs, DLQ, cron, webhooks, workers, live activity, and the server process itself. Try the live demo, no server required."
    />
    <link rel="canonical" href="https://egeominotti.github.io/bunqueue-dashboard/" />
    <!-- Social cards. The demo URL is the project's most-shared link, so it must
         unfurl with a real image/description on Twitter/Slack/Reddit/LinkedIn.
         og:image is an absolute URL (scrapers don't resolve base-relative paths);
         the image is hosted on Pages and loads from there for any deploy. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="bunqueue dashboard" />
    <meta property="og:title" content="bunqueue dashboard — drive a Bun job queue from your browser" />
    <meta
      property="og:description"
      content="Fully drive a bunqueue server from one UI: queues, jobs, DLQ, cron, webhooks, workers, live activity, and start/stop/restart of the server itself. Live demo, no signup."
    />
    <meta property="og:url" content="https://egeominotti.github.io/bunqueue-dashboard/" />
    <meta property="og:image" content="https://egeominotti.github.io/bunqueue-dashboard/og.png" />
    <meta property="og:image:width" content="1600" />
    <meta property="og:image:height" content="1196" />
    <meta property="og:image:alt" content="The bunqueue dashboard: stat cards, a queue-health grid, and a live activity feed." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="bunqueue dashboard — drive a Bun job queue from your browser" />
    <meta
      name="twitter:description"
      content="Fully drive a bunqueue server from one UI: queues, jobs, DLQ, cron, webhooks, workers, and start/stop/restart. Live demo, no signup."
    />
    <meta name="twitter:image" content="https://egeominotti.github.io/bunqueue-dashboard/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
