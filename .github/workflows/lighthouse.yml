name: Lighthouse

# Performance / accessibility / best-practices / SEO budgets for the built SPA.
# Runs on pull requests (and on demand), builds the app, and audits it with
# Lighthouse CI against the static bundle. Assertions are advisory (warn) for
# now — the report is uploaded to temporary public storage and linked on the run
# — so this is visibility first; promote the thresholds to `error` to enforce.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.14

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
