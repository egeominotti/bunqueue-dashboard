name: CI

# Runs the full quality gate on every push to main and every pull request:
# lint + format (Biome), typecheck + production build (tsc + Vite), and the
# unit / agent-lifecycle test suite (bun test). Mirrors `bun run build`,
# `bun run check`, and `bun test` from the project's local gate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref so only the latest commit is verified.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14

jobs:
  gate:
    name: Lint · Typecheck · Build · Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint & format (Biome)
        run: bun run check

      - name: Typecheck & build
        run: bun run build

      - name: Test (with coverage)
        run: bun test --coverage

      # Report known-vulnerable dependencies. Non-blocking: a newly-published
      # advisory shouldn't wedge every merge, but it surfaces in the log/summary.
      - name: Dependency audit
        run: bun audit
        continue-on-error: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
          retention-days: 7
          if-no-files-found: error
