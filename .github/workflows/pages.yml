name: Deploy to GitHub Pages

# Builds the dashboard as a static SPA and publishes it to GitHub Pages on every
# push to main. Pages serves the app from the project sub-path
# (https://<owner>.github.io/<repo>/), so we build with VITE_BASE set to that
# path and copy index.html -> 404.html to give React Router a client-side
# fallback for deep links.
#
# The deployed app runs in DEMO mode (VITE_DEMO=1): a bundled fetch/SSE shim
# answers every bunqueue API call from a fixture captured from a real server, so
# the public Pages URL is a fully explorable live demo with no backend. To drive
# a real server instead, run your own build (Docker / the standalone binary)
# without VITE_DEMO and point it at the server via Settings / VITE_BUNQUEUE_URL.
#
# The illustrated documentation site is built with VitePress into dist/docs and
# published alongside the app at /<repo>/docs/.
#
# Pages is auto-provisioned by the "Configure Pages" step (enablement: true), so
# no manual Settings toggle is required — the first run enables it. (If your org
# restricts Pages, enable it once under Settings ▸ Pages ▸ Source → GitHub Actions.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  BUN_VERSION: 1.3.14

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # The same gate ci.yml enforces — a commit that fails lint or tests must
      # not be published to the public Pages site just because it compiles.
      - name: Lint & format (biome)
        run: bun run check

      - name: Test
        run: bun test

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6
        with:
          # Best-effort: try to provision Pages (build type = GitHub Actions) on
          # the first run. With the default GITHUB_TOKEN this can be a no-op —
          # creating a Pages *site* needs administration:write, which GITHUB_TOKEN
          # cannot hold — so if the first deploy fails with "Get Pages site failed",
          # enable it once under Settings ▸ Pages ▸ Source → GitHub Actions.
          enablement: true

      - name: Build (demo mode)
        env:
          VITE_BASE: ${{ steps.pages.outputs.base_path }}/
          VITE_DEMO: '1'
        run: bun run build

      # Build the VitePress documentation site and place it under dist/docs so
      # Pages serves it at https://<owner>.github.io/<repo>/docs/ alongside the
      # app at the root. DOCS_BASE must match that sub-path (with trailing slash).
      - name: Build docs site (VitePress)
        env:
          DOCS_BASE: ${{ steps.pages.outputs.base_path }}/docs/
        run: |
          bun run docs:build
          mkdir -p dist/docs
          cp -r docs/.vitepress/dist/. dist/docs/

      - name: SPA fallback (404 -> index.html)
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    # actions/deploy-pages polls until the deployment goes live; on this repo that
    # step routinely runs ~8-9 min, and the larger /docs artifact tipped it past a
    # 10-min cap (job cancelled). Give generous headroom — the action self-limits.
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        timeout-minutes: 20
        with:
          # deploy-pages polls until the deployment is live. Use its maximum
          # (600000 ms = 10 min; higher values are clamped to this with a
          # warning). The step's 20-min cap and the job's 30-min cap bound it
          # further. Transient "Deployment failed, try again later" errors are a
          # Pages-backend issue, not a timeout — re-run the failed job.
          timeout: 600000
