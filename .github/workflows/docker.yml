name: Docker

# Builds the dashboard container and publishes it to the GitHub Container
# Registry (ghcr.io/<owner>/<repo>). Runs on pushes to main (tagged `edge`) and
# on version tags `v*` (tagged with the semver + `latest`). Multi-arch
# (amd64 + arm64) via Buildx + QEMU, with a registry-backed layer cache.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write # mint the OIDC token for provenance attestation
  attestations: write # write the attestation to the repo

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BUN_VERSION: 1.3.14

jobs:
  # The same gate ci.yml enforces — without it a commit whose tests fail would
  # still ship publicly as `edge` (the Dockerfile only runs `bun run build`).
  gate:
    name: Gate (check + build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint & format (biome)
        run: bun run check

      - name: Typecheck & build
        run: bun run build

      - name: Test
        run: bun test

  build-push:
    name: Build & push image
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # latest=auto tags `latest` on the newest semver tag (never on main).
          flavor: |
            latest=auto
          tags: |
            type=ref,event=branch
            type=edge,branch=main
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Attach a Software Bill of Materials to the image; provenance is
          # emitted as a signed attestation in the next step instead.
          sbom: true
          provenance: false

      # Signed, verifiable build provenance (SLSA) for the pushed image, so
      # consumers can run `gh attestation verify oci://ghcr.io/...` to confirm it
      # was built from this repo by this workflow.
      - name: Attest image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
