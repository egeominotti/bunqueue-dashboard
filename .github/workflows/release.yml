name: Release

# On a version tag (v*), re-runs the full gate, builds the production bundle,
# zips dist/, and publishes a GitHub Release with auto-generated notes and the
# bundle attached. The Docker workflow publishes the matching image in parallel
# (both trigger on `v*` tags).

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  BUN_VERSION: 1.3.14

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify gate (lint · build · test)
        run: |
          bun run check
          bun run build
          bun test

      - name: Package bundle
        run: |
          cp README.md dist/README.md
          (cd dist && zip -r "../bunqueue-dashboard-${GITHUB_REF_NAME}.zip" .)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: bunqueue-dashboard-*.zip
          fail_on_unmatched_files: true
