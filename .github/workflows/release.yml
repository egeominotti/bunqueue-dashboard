name: Release

# Publishes a GitHub Release on EVERY push to main (continuous delivery) and on
# manual version tags (v*). For main pushes the tag is auto-computed as
# v0.1.<commit count> — monotonic and deterministic — and created by the release
# step itself. The full gate (lint · build · test) re-runs before publishing,
# and the built dist/ is zipped and attached with auto-generated notes.
#
# Note: tags created here use GITHUB_TOKEN, which by design does NOT trigger
# other workflows — so docker.yml's semver/latest images still come from
# manually pushed v* tags; `edge` already tracks every main push.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# One release at a time, in push order — never cancel a publish mid-flight.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

env:
  BUN_VERSION: 1.3.14

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the commit count is correct for auto-versioning.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify gate (lint · build · test)
        run: |
          bun run check
          bun run build
          bun test

      - name: Resolve release tag
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            TAG="v0.1.$(git rev-list --count HEAD)"
            # Skip publishing if this auto-tag already exists (re-run, or a
            # rebase/force-push lowering the commit count — fails safe as a
            # no-publish, never a clobber). Gaps in the sequence under burst
            # pushes are acceptable by design.
            if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
              echo "publish=false" >> "$GITHUB_OUTPUT"
              echo "Tag ${TAG} already exists — skipping publish."
            else
              echo "publish=true" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Package bundle
        if: steps.ver.outputs.publish == 'true'
        run: |
          cp README.md dist/README.md
          (cd dist && zip -qr "../bunqueue-dashboard-${{ steps.ver.outputs.tag }}.zip" .)

      - name: Publish GitHub Release
        if: steps.ver.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: bunqueue-dashboard-*.zip
          fail_on_unmatched_files: true
