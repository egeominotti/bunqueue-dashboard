name: Release

# Publishes a GitHub Release on EVERY push to main (continuous delivery) and on
# manual version tags (v*). For main pushes the version comes from package.json
# (the single source of truth, bumped on every push, starting at 0.0.1) and the
# matching v<version> tag is created by the release step itself. If package.json
# was not bumped, its tag already exists and the publish is skipped (never a
# clobber). The full gate (lint, build, test) re-runs before publishing, and the
# built dist/ is zipped and attached with generated notes.
#
# Note: tags created here use GITHUB_TOKEN, which by design does NOT trigger
# other workflows — so docker.yml's semver/latest images still come from
# manually pushed v* tags; `edge` already tracks every main push.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# One release at a time, in push order — never cancel a publish mid-flight.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write # mint the OIDC token for artifact provenance attestation
  attestations: write # write the attestation to the repo

env:
  BUN_VERSION: 1.3.14

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + tags so the changelog extract and the existing-tag
          # check (skip-if-already-released) work.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify gate (lint · build · test)
        run: |
          bun run check
          bun run build
          bun test

      - name: Resolve release tag
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            # package.json owns the version (bumped on every push to main), and
            # the release/tag simply follows it — one source of truth. Read it
            # without assuming a runtime is on PATH.
            VER=$(sed -n 's/.*"version": *"\([^"]*\)".*/\1/p' package.json | head -1)
            TAG="v${VER}"
            # Skip if this version already has a tag (package.json wasn't bumped
            # this push) — fails safe as a no-publish, never a clobber.
            if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
              echo "publish=false" >> "$GITHUB_OUTPUT"
              echo "Tag ${TAG} already exists (package.json version not bumped) — skipping publish."
            else
              echo "publish=true" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog notes
        id: notes
        if: steps.ver.outputs.publish == 'true'
        run: |
          # Publish the CHANGELOG.md section for this version as the release body.
          # Prefer an exact "## [x.y.z]" section; fall back to "## [Unreleased]";
          # if neither has content, leave it empty and let generate_release_notes
          # produce the auto commit list.
          VER="${{ steps.ver.outputs.tag }}"; VER="${VER#v}"
          extract() {
            awk -v h="$1" '
              /^## /{ if (p) exit; if (index($0, h)) { p=1; next } }
              p { print }
            ' CHANGELOG.md
          }
          : > notes.md
          if [ -f CHANGELOG.md ]; then
            extract "[$VER]" > notes.md
            [ -s notes.md ] || extract "[Unreleased]" > notes.md
          fi
          # Drop trailing link-reference definitions (e.g. "[0.1.0]: https://…")
          # that the last section runs into, then trim leading blank lines.
          sed -i -E '/^\[[^]]+\]: https?:\/\//d' notes.md
          sed -i -e '/./,$!d' notes.md
          if [ -s notes.md ]; then echo "Using CHANGELOG.md section for ${VER}"; else echo "No changelog section — falling back to generated notes"; fi

      - name: Package bundle
        if: steps.ver.outputs.publish == 'true'
        run: |
          cp README.md dist/README.md
          (cd dist && zip -qr "../bunqueue-dashboard-${{ steps.ver.outputs.tag }}.zip" .)

      # Standalone executables: one self-contained binary per platform that
      # serves the embedded dashboard, proxies /api to the bunqueue server and
      # runs the control agent (scripts/serve.ts). Cross-compiled with
      # `bun build --compile --target=...`.
      - name: Build standalone executables (all platforms)
        if: steps.ver.outputs.publish == 'true'
        run: |
          bun run scripts/gen-embed.ts
          for target in bun-linux-x64 bun-linux-arm64 bun-darwin-x64 bun-darwin-arm64 bun-windows-x64; do
            suffix="${target#bun-}"
            out="bunqueue-dashboard-${{ steps.ver.outputs.tag }}-${suffix}"
            if [ "$target" = "bun-windows-x64" ]; then out="${out}.exe"; fi
            bun build scripts/serve.ts --compile --minify --target="$target" --outfile "$out"
          done
          ls -la bunqueue-dashboard-*

      # SHA256SUMS lets anyone verify a downloaded artifact's integrity
      # (`sha256sum -c SHA256SUMS`). The two globs MUST stay disjoint — the zip
      # is bunqueue-dashboard-v<ver>.zip (no dash after the version) and the
      # binaries are bunqueue-dashboard-v<ver>-<platform>. A pattern matching
      # both (e.g. `bunqueue-dashboard-v*`) duplicates the zip: a doubled line
      # here, and in the release step below a concurrent double upload of the
      # same asset that races and fails the publish (broke v0.0.22).
      - name: Generate checksums
        if: steps.ver.outputs.publish == 'true'
        run: sha256sum bunqueue-dashboard-*.zip bunqueue-dashboard-v*-* > SHA256SUMS

      # Signed, verifiable build provenance (SLSA) for every published artifact,
      # so downloads can be checked with `gh attestation verify <file> --repo …`.
      - name: Attest artifact provenance
        if: steps.ver.outputs.publish == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            bunqueue-dashboard-*.zip
            bunqueue-dashboard-v*-*

      - name: Publish GitHub Release
        if: steps.ver.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          # Curated CHANGELOG.md section as the body; generated notes (the auto
          # commit/PR list) are appended after it. An empty notes.md → notes only.
          body_path: notes.md
          generate_release_notes: true
          files: |
            bunqueue-dashboard-*.zip
            bunqueue-dashboard-v*-*
            SHA256SUMS
          fail_on_unmatched_files: true

  # Publishes the package to npm (`bunx bunqueue-dashboard`) after the release
  # job's gate has passed. Independently idempotent: it publishes iff the
  # NPM_TOKEN secret is configured AND package.json's version is not already on
  # the registry — so an un-bumped push or a missing secret is a clean skip,
  # never a failure. `npm publish` runs the `prepack` script (vite build +
  # embed manifest), so the tarball always carries a fresh dist/.
  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node (npm registry auth)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check publish preconditions
        id: pre
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "No NPM_TOKEN secret configured — skipping npm publish."
            exit 0
          fi
          VER=$(sed -n 's/.*"version": *"\([^"]*\)".*/\1/p' package.json | head -1)
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          if npm view "bunqueue-dashboard@${VER}" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "bunqueue-dashboard@${VER} already on npm — skipping."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.pre.outputs.publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # --provenance: signed build attestation linking the package to this
        # workflow run (uses the job's OIDC id-token permission).
        run: npm publish --provenance --access public
