name: Release

# Publishes a GitHub Release on EVERY push to main (continuous delivery) and on
# manual version tags (v*). For main pushes the next version is bumped from the
# latest existing v* tag with decimal rollover — patch 0-9, then the minor
# increments (…v0.1.9 → v0.2.0 → v0.2.1…) — and the tag is created by the
# release step itself. The full gate (lint · build · test) re-runs before
# publishing, and the built dist/ is zipped and attached with generated notes.
#
# Note: tags created here use GITHUB_TOKEN, which by design does NOT trigger
# other workflows — so docker.yml's semver/latest images still come from
# manually pushed v* tags; `edge` already tracks every main push.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# One release at a time, in push order — never cancel a publish mid-flight.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

env:
  BUN_VERSION: 1.3.14

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the commit count is correct for auto-versioning.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify gate (lint · build · test)
        run: |
          bun run check
          bun run build
          bun test

      - name: Resolve release tag
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            # Bump from the latest v* tag with decimal rollover: patch 0-9,
            # then the minor increments (v0.1.9 → v0.2.0). Self-healing: it
            # always continues from whatever the highest existing tag is.
            LAST=$(git tag --list 'v*' --sort=-v:refname | head -1)
            if [ -z "$LAST" ]; then
              TAG="v0.1.0"
            else
              BASE="${LAST#v}"
              MAJOR=$(echo "$BASE" | cut -d. -f1 | tr -cd '0-9')
              MINOR=$(echo "$BASE" | cut -d. -f2 | tr -cd '0-9')
              PATCH=$(echo "$BASE" | cut -d. -f3 | tr -cd '0-9')
              : "${MAJOR:=0}" "${MINOR:=1}" "${PATCH:=0}"
              # 10# forces base-10 so a zero-padded tag (v0.1.08) can't trip
              # bash's octal parsing.
              if [ "$((10#$PATCH))" -ge 9 ]; then
                MINOR=$((10#$MINOR + 1)); PATCH=0
              else
                PATCH=$((10#$PATCH + 1))
              fi
              TAG="v${MAJOR}.${MINOR}.${PATCH}"
            fi
            # Skip if the computed tag somehow exists (re-run race) — fails
            # safe as a no-publish, never a clobber.
            if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
              echo "publish=false" >> "$GITHUB_OUTPUT"
              echo "Tag ${TAG} already exists — skipping publish."
            else
              echo "publish=true" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Package bundle
        if: steps.ver.outputs.publish == 'true'
        run: |
          cp README.md dist/README.md
          (cd dist && zip -qr "../bunqueue-dashboard-${{ steps.ver.outputs.tag }}.zip" .)

      # Standalone executables: one self-contained binary per platform that
      # serves the embedded dashboard, proxies /api to the bunqueue server and
      # runs the control agent (scripts/serve.ts). Cross-compiled with
      # `bun build --compile --target=...`.
      - name: Build standalone executables (all platforms)
        if: steps.ver.outputs.publish == 'true'
        run: |
          bun run scripts/gen-embed.ts
          for target in bun-linux-x64 bun-linux-arm64 bun-darwin-x64 bun-darwin-arm64 bun-windows-x64; do
            suffix="${target#bun-}"
            out="bunqueue-dashboard-${{ steps.ver.outputs.tag }}-${suffix}"
            if [ "$target" = "bun-windows-x64" ]; then out="${out}.exe"; fi
            bun build scripts/serve.ts --compile --minify --target="$target" --outfile "$out"
          done
          ls -la bunqueue-dashboard-*

      - name: Publish GitHub Release
        if: steps.ver.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            bunqueue-dashboard-*.zip
            bunqueue-dashboard-v*
          fail_on_unmatched_files: true
