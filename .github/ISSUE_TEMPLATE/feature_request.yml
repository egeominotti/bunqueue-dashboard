name: ✨ Feature request
description: Suggest a capability or improvement for the dashboard.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point, not just the solution.
      placeholder: When operating many queues I can't quickly …
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see. Sketches or examples welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard (UI)
        - Control agent
        - Deployment
        - Docs
        - Other
    validations:
      required: true
