version: 2
updates:
  # Application dependencies (Bun / npm registry).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      react:
        patterns: ["react", "react-dom", "react-router-dom", "@types/react*"]
      dev-tooling:
        patterns: ["vite", "@vitejs/*", "@tailwindcss/*", "tailwindcss", "@biomejs/*", "typescript", "@types/*"]
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci(deps)"

  # Docker base images.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(docker)"
