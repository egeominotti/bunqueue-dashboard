# nginx config for serving the bunqueue dashboard SPA.
# - History-API fallback: unknown paths return index.html so React Router deep
#   links and refreshes work.
# - Long-cache the fingerprinted assets; never cache the HTML entrypoint.
server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Compress text assets on the fly.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fingerprinted build assets are immutable.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # Never cache the HTML shell so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
